services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ..:/factory
    environment:
      - PROJECT_ROOT=/factory
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
