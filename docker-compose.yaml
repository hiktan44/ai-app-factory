# ============================================================
# AI App Factory - Coolify Production Compose
# Bu dosya Coolify'da docker-compose build pack ile kullanılır.
# Persistent volume: ai-factory-runs → /factory/runs
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000"
    volumes:
      # Persistent: tüm /factory dizini — settings.json, learnings.json, runs/, prompts/ hepsi korunur
      - ai-factory-data:/factory
    environment:
      - NODE_ENV=production
      - PROJECT_ROOT=/factory
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_ORG=${GITHUB_ORG:-}
      - COOLIFY_API_URL=${COOLIFY_API_URL:-}
      - COOLIFY_API_TOKEN=${COOLIFY_API_TOKEN:-}
      - VERCEL_TOKEN=${VERCEL_TOKEN:-}
      - VERCEL_TEAM_ID=${VERCEL_TEAM_ID:-}
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - "traefik.enable=true"
      # Coolify otomatik olarak servis ve router oluşturur — HARDCODE edilmiş ID'leri KALDIR
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      # Traefik'e hangi network üzerinden routing yapacağını söyle
      - "traefik.docker.network=coolify"
      
      # NOT: Host kuralı ve domain ayarlarını Coolify UI'dan yap
      # Coolify otomatik olarak gerekli tüm traefik ayarlarını oluşturur
      # Manuel olarak router tanımlama — çakışma ve bad gateway hatasına sebep olur
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  # Named volume — deploy'lar arasında tüm factory verisi korunur
  # (settings.json, learnings.json, runs/, prompts/, logs/)
  ai-factory-data:
    name: ai-factory-data
