# ============================================================
# AI App Factory - Coolify Production Compose
# Bu dosya Coolify'da docker-compose build pack ile kullanılır.
# Persistent volume: ai-factory-runs → /factory/runs
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000"
    volumes:
      # Persistent: tüm /factory dizini — settings.json, learnings.json, runs/, prompts/ hepsi korunur
      - ai-factory-data:/factory
    environment:
      - NODE_ENV=production
      - PROJECT_ROOT=/factory
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG:-}
      - COOLIFY_API_URL=${COOLIFY_API_URL:-}
      - COOLIFY_API_TOKEN=${COOLIFY_API_TOKEN:-}
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - "traefik.enable=true"
      # Service definition (shared by both HTTP and HTTPS routers)
      - "traefik.http.services.http-0-pow0pe99mv2wgcwapdo381oq-web.loadbalancer.server.port=3000"
      # HTTPS router (Coolify generates HTTP router but not HTTPS)
      - "traefik.http.routers.https-0-pow0pe99mv2wgcwapdo381oq-web.entryPoints=https"
      - "traefik.http.routers.https-0-pow0pe99mv2wgcwapdo381oq-web.rule=Host(`uygulama.seymata.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-0-pow0pe99mv2wgcwapdo381oq-web.service=http-0-pow0pe99mv2wgcwapdo381oq-web"
      - "traefik.http.routers.https-0-pow0pe99mv2wgcwapdo381oq-web.tls=true"
      - "traefik.http.routers.https-0-pow0pe99mv2wgcwapdo381oq-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-0-pow0pe99mv2wgcwapdo381oq-web.middlewares=gzip"
      # Traefik'e hangi network üzerinden routing yapacağını söyle
      - "traefik.docker.network=coolify"
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  # Named volume — deploy'lar arasında tüm factory verisi korunur
  # (settings.json, learnings.json, runs/, prompts/, logs/)
  ai-factory-data:
    name: ai-factory-data
